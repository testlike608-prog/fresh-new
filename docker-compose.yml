# ════════════════════════════════════════════════════════════════
#  Water Inspection System — docker-compose.yml
#  يشغّل الـ Container مع كل الـ hardware و volumes الصح
#
#  تشغيل:     docker compose up -d
#  إيقاف:     docker compose down
#  لوجات:     docker compose logs -f
# ════════════════════════════════════════════════════════════════

services:
  water-inspection:
    # الـ image ده بيتبني وينشر أوتوماتيك بالـ GitHub Action
    # (.github/workflows/docker-build.yml) من ريبو testlike608-prog/fresh-new
    image: ghcr.io/testlike608-prog/fresh-new:latest
    # أو لو بتبني locally بدل ما تسحب من GHCR:
    # build: .

    container_name: water-inspection

    # ── Ports ────────────────────────────────────────────────────
    ports:
      - "8000:8000"

    # ── Volume: كل الملفات الديناميكية على الـ Host ───────────────
    # ./data على الـ Host ↔ /app/data جوه الـ Container
    volumes:
      - ./data:/app/data

    # ── Environment variables ────────────────────────────────────
    env_file:
      - .env                  # GROQ_API_KEY, GEMINI_API_KEY, CORS_ORIGINS
    environment:
      - DATA_DIR=/app/data
      - PYTHONUNBUFFERED=1

    # ── Hardware devices ─────────────────────────────────────────
    # كاميرا UseePlus (endoscope, VID=0x2CE3/PID=0x3828) بتتوصل USB
    # مباشر عن طريق pyusb — مش /dev/videoX (دي كاميرات UVC عادية بس).
    # بننزّل الـ USB bus كله + نفتح صلاحية الـ device class (189 = USB)
    # عشان pyusb يقدر يعمل enumerate/claim للجهاز من جوه الكونتينر.
    devices:
      - /dev/bus/usb:/dev/bus/usb
    device_cgroup_rules:
      - "c 189:* rmw"
    # Barcode scanner (keyboard library يحتاج /dev/input)
    # لو السكانر هاردوير: أضف السطر ده
    # - /dev/input:/dev/input
    # لو المشكلة استمرت (permission denied على USB)، فعّل السطر ده
    # كحل أخير (بيدي صلاحيات كاملة للكونتينر):
    # privileged: true

    # ── Network ──────────────────────────────────────────────────
    # host mode عشان يوصل للكوبوت على 192.168.57.x بدون NAT
    # لو مش محتاج كوبوت على نفس الـ subnet، غيّر لـ bridge
    network_mode: host

    # ── Restart policy ───────────────────────────────────────────
    restart: unless-stopped

    # ── Resource limits (اختياري) ────────────────────────────────
    # deploy:
    #   resources:
    #     limits:
    #       memory: 2g

    # ── Privileges (لو السكانر keyboard محتاج evdev) ────────────
    # group_add:
    #   - input    # يضيف user للـ input group عشان يقرأ /dev/input
