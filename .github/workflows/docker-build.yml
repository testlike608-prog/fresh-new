# ════════════════════════════════════════════════════════════════
#  Build & Push Docker Image → GitHub Container Registry (GHCR)
#  الـ image بيطلع على: ghcr.io/<owner>/<repo>
#  لريبو الحالي: ghcr.io/testlike608-prog/fresh-new
# ════════════════════════════════════════════════════════════════

name: Build and Push Docker Image

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  workflow_dispatch:      # زرار تشغيل يدوي من تاب Actions

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # testlike608-prog/fresh-new

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # لازم عشان ننشئ Release فيه الملفات للتنزيل
      packages: write      # لازم عشان ينشر على GHCR

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # جاهز تلقائيًا، مش محتاج تعمل حاجة

      - name: Extract image metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short
            type=ref,event=tag

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── من هنا: تجهيز "زرار تنزيل" واحد (GitHub Release) فيه ────────
      # 1) صورة الـ Docker جاهزة كملف (offline، بدون داعي لـ docker login)
      # 2) حزمة التشغيل: docker-compose.yml + start-water-inspection.bat
      #    + .env.example + هيكل فولدر data/ فاضي
      - name: Pull built image (عشان نصدّرها كملف)
        if: github.ref == 'refs/heads/main'
        run: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Export image → tar.gz (تشغيل offline بدون GHCR login)
        if: github.ref == 'refs/heads/main'
        run: |
          docker save ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            | gzip > water-inspection-image.tar.gz

      - name: Prepare deployment bundle (compose + bat + data scaffold)
        if: github.ref == 'refs/heads/main'
        run: |
          sudo apt-get update -y && sudo apt-get install -y zip
          BUNDLE=bundle/water-inspection
          mkdir -p "$BUNDLE"/data/{results,captures,enhanced_images,logs,failed_cases,failed_has_water,result}
          cp docker-compose.yml "$BUNDLE"/
          cp start-water-inspection.bat "$BUNDLE"/
          cp .env.example "$BUNDLE"/.env.example
          find "$BUNDLE"/data -type d -empty -exec touch {}/.gitkeep \;
          (cd bundle && zip -r ../deployment-bundle.zip water-inspection)

      - name: Create GitHub Release مع كل الملفات للتنزيل
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Water Inspection — Build #${{ github.run_number }}"
          make_latest: true
          body: |
            تشغيل من الصفر على جهاز جديد:
            1) نزّل `deployment-bundle.zip` وفكّه (فيه docker-compose.yml + start-water-inspection.bat + .env.example + فولدر data/).
            2) لو الجهاز مالوش إنترنت/login على GHCR: نزّل `water-inspection-image.tar.gz` وشغّل:
               `docker load -i water-inspection-image.tar.gz`
            3) انسخ `.env.example` لـ `.env` واملأ المفاتيح.
            4) على Windows: شغّل `start-water-inspection.bat`.
               على Linux: `docker compose up -d`.
          files: |
            deployment-bundle.zip
            water-inspection-image.tar.gz
